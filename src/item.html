<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Item</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <h1 class="title">BantayPresyo</h1>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="container">

    <!-- ITEM TITLE -->
    <h2 id="itemTitle"></h2>

    <!-- ===== INPUT SECTION ===== -->
    <section class="card">

      <div class="input-box">
        <span>₱</span>
        <input type="number" id="price" placeholder="Ilagay ang presyo">
      </div>

      <button class="primary" onclick="addPrice()">Add Presyo</button>

      <p id="feedback"></p>

    </section>

    <!-- ===== GRAPH ===== -->
    <section class="card">
      <h3>📈 Price History</h3>
      <canvas id="priceChart"></canvas>
    </section>

    <!-- ===== TABLE ===== -->
    <section class="card">

      <h3>📅 History</h3>

      <p class="description">
        Updated habang naglalagay ka ng presyo
      </p>

      <table id="priceTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    </section>

    <!-- ===== BACK BUTTON ===== -->
    <button class="back-btn" onclick="goBack()">← Bumalik</button>

  </main>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
