<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-content">

      <!-- LEFT: TITLE + STATUS -->
      <div class="header-left">
        <h1 class="title">BantayPresyo</h1>
        <p id="status"></p>
      </div>

      <!-- RIGHT: LOGOUT -->
      <button class="header-back" onclick="goLogin()">←</button>

    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="container">

    <!-- GREETING -->
    <h2 id="greeting"></h2>

    <!-- CATEGORY LIST -->
    <section class="card">

      <button class="category-card gulay" onclick="goCategory('gulay')">
        🥬 Gulay <span>→</span>
      </button>

      <button class="category-card karne" onclick="goCategory('karne')">
        🍗 Karne <span>→</span>
      </button>

      <button class="category-card isda" onclick="goCategory('isda')">
        🐟 Isda <span>→</span>
      </button>

      <button class="category-card staple" onclick="goCategory('staple')">
        🍚 Staple <span>→</span>
      </button>

      <button class="category-card sari" onclick="goCategory('sari')">
        🧃 Sari-sari <span>→</span>
      </button>

    </section>

  </main>

  <!-- ===== SCRIPT ===== -->
  <script src="js/script.js"></script>

</body>
</html>
