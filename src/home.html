<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">

  <div style="display:flex; align-items:center; justify-content:space-between;">

    <!-- LEFT SIDE -->
    <div>
      <div class="title">BantayPresyo</div>
      <p id="status"></p>
    </div>

    <!-- BACK BUTTON (TO LOGIN) -->
    <div class="header-back" onclick="goLogin()">←</div>

  </div>

</div>
  <!-- GREETING -->
  <h2 id="greeting"></h2>

  <!-- CATEGORY LIST -->
  <div class="card">

    <div class="category-card gulay" onclick="goCategory('gulay')">
      🥬 Gulay <span>→</span>
    </div>

    <div class="category-card karne" onclick="goCategory('karne')">
      🍗 Karne <span>→</span>
    </div>

    <div class="category-card isda" onclick="goCategory('isda')">
      🐟 Isda <span>→</span>
    </div>

    <div class="category-card staple" onclick="goCategory('staple')">
      🍚 Staple <span>→</span>
    </div>

    <div class="category-card sari" onclick="goCategory('sari')">
      🧃 Sari-sari <span>→</span>
    </div>

  </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
